<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tank Wars</title>
    <link rel="stylesheet" href="css/style.css" />
    <link href="https://fonts.googleapis.com/css?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
<h1>TANK WARS</h1>
<canvas id="gameCanvas" width="800" height="400" class="hidden"></canvas>

<div id="matchSetupOverlay" class="visible">
    <div class="setup-container">
        <h1>TANK WARS</h1>
        
        <div class="setup-sections">
            <section class="roster-section">
                <h2>PLAYER ROSTER</h2>
                <div id="playerList" class="player-list">
                    <!-- Players will be added here dynamically -->
                </div>
                <button id="addPlayerButton" class="setup-btn">ADD PLAYER</button>
            </section>

            <section class="settings-section">
                <h2>MATCH SETTINGS</h2>
                <div class="setting-group">
                    <label>Number of Games</label>
                    <input type="number" id="matchGames" min="1" max="99" value="5">
                </div>
                <div class="setting-group">
                    <label>Win Condition</label>
                    <select id="winCondition">
                        <option value="score">Cumulative Score</option>
                        <option value="wins">Most Wins</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label>Starting Cash</label>
                    <input type="number" id="startingCash" min="0" max="10000" value="100">
                </div>
                <div class="setting-group">
                    <label>Wind Intensity</label>
                    <select id="windIntensity">
                        <option value="none">None</option>
                        <option value="low">Low</option>
                        <option value="normal" selected>Normal</option>
                        <option value="high">High</option>
                        <option value="random">Random</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label>Map Style</label>
                    <select id="mapStyle">
                        <option value="random" selected>Random</option>
                        <option value="hills">Rolling Hills</option>
                        <option value="valley">Valley</option>
                        <option value="rugged">Rugged</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label>Edge Behavior</label>
                    <select id="edgeBehavior">
                        <option value="impact" selected>Standard (Impact)</option>
                        <option value="reflect">Reflect (Chaos!)</option>
                        <option value="teleport">Teleport (Wrap)</option>
                        <option value="random">Random (New rule each round)</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label>Turn Timer</label>
                    <div class="toggle-group">
                        <input type="checkbox" id="timerToggle">
                        <input type="number" id="timerSeconds" min="5" max="60" value="30" disabled>
                        <span>sec</span>
                    </div>
                </div>
                <div class="setting-group">
                    <label title="Chance for a tank to trigger a random chaotic item on death (if in inventory)">Death Trigger</label>
                    <div class="range-group">
                        <input type="range" id="deathTriggerChance" min="0" max="100" value="10">
                        <span id="deathTriggerValue">10%</span>
                    </div>
                </div>
                <div class="setting-group disabled">
                    <label>Sudden Death</label>
                    <span class="coming-soon">COMING SOON</span>
                </div>
            </section>
        </div>

        <div class="setup-actions">
            <button id="resetSettingsButton" class="setup-btn reset-btn">RESET SETTINGS</button>
            <button id="initMatchButton" class="start-btn">START MATCH</button>
        </div>
    </div>
</div>
<div id="gameOverOverlay" class="hidden">
    <p id="gameOverMessage"></p>
    <button id="continueButton">Continue</button>
    <button id="newGameButton">New Game</button>
</div>

<div id="lobbyOverlay" class="hidden">
    <div id="scoreboardContainer"></div>
    <div id="lobbyPrompt"></div>
    <button id="startShoppingButton" class="hidden">Enter Store</button>
</div>

<!-- Mobile Controls -->
<div id="mobileControls" class="mobile-only">
    <div class="mobile-left-controls">
        <div class="mobile-slider-group" id="angleSliderGroup">
            <label>ANGLE</label>
            <div class="slider-container">
                <button class="fine-tune-btn" id="anglePlus">+</button>
                <div class="slider-track vertical">
                    <div id="angleHandle" class="slider-handle"></div>
                </div>
                <button class="fine-tune-btn" id="angleMinus">-</button>
            </div>
            <span id="angleValueDisplay">45°</span>
        </div>
        <div class="mobile-slider-group" id="powerSliderGroup">
            <label>POWER</label>
            <div class="slider-container">
                <button class="fine-tune-btn" id="powerPlus">+</button>
                <div class="slider-track vertical">
                    <div id="powerHandle" class="slider-handle"></div>
                </div>
                <button class="fine-tune-btn" id="powerMinus">-</button>
            </div>
            <span id="powerValueDisplay">50</span>
        </div>
    </div>

    <div class="mobile-right-controls">
        <button id="mobileFireBtn" class="mobile-action-btn fire">FIRE</button>
    </div>

    <div id="mobileInventoryBar" class="mobile-inventory">
        <!-- Will be populated dynamically like the desktop weapon selector -->
    </div>
</div>


<!-- Load game as a module -->
<script type="module" src="js/main.js"></script>
</body>
</html>
